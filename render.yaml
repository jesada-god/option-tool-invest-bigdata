# Render Blueprint: one same-origin FastAPI web service.
# The app serves the UI, REST API, and WebSocket from the same Render URL.
services:
  - type: web
    name: quantora-ai
    runtime: python
    region: singapore
    plan: free
    numInstances: 1
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: sh scripts/start-render.sh
    healthCheckPath: /healthz
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRUST_PROXY_HEADERS
        value: "true"
      # Use Render's generated HTTPS URL as the fixed production auth origin.
      # Override this value manually if the service later moves to a custom
      # canonical domain, then update the matching Supabase redirect URLs.
      - key: PUBLIC_APP_URL
        fromService:
          name: quantora-ai
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      # Render generates a private 256-bit value on first Blueprint creation.
      # It is used to sign the short-lived server-side Google OAuth PKCE state.
      - key: AUTH_STATE_SECRET
        generateValue: true
      # Keep the Google button hidden until its provider credentials and exact
      # callback URL have been configured in Supabase and Google Cloud.
      - key: SUPABASE_GOOGLE_ENABLED
        value: "false"
      # Prompt only while the Blueprint is initially created. Values are never
      # committed and later Blueprint syncs leave the dashboard values intact.
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
