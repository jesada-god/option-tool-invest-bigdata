name: Validate application

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests and security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install backend and audit dependencies
        run: python -m pip install -r requirements.txt pip-audit
      - name: Compile and lint production Python
        run: |
          python -m compileall -q .
          python scripts/check_python_quality.py
          python scripts/validate_production_config.py
      - name: Import application and verify health check
        run: python -c "import main; assert main.health_check()['status'] == 'ok'"
      - name: Run deterministic unit tests
        shell: bash
        run: |
          # Preserve the test command's exit status while writing the final
          # traceback to the GitHub Job Summary.  This makes a failed deploy
          # diagnosable without changing a failing check into a false pass.
          set +e
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee "$RUNNER_TEMP/unittest.log"
          test_status=${PIPESTATUS[0]}
          {
            echo "### Deterministic unit tests"
            echo
            echo '```text'
            tail -n 240 "$RUNNER_TEMP/unittest.log"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$test_status"
      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt
      - name: Validate Render startup script
        run: sh -n scripts/start-render.sh

  frontend:
    name: Frontend tests and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install locked frontend dependencies
        run: npm ci
      - name: Build Vite frontend
        run: npm run build
      - name: Run frontend unit and route smoke tests
        run: npm run test:frontend
      - name: Lint and syntax-check frontend sources
        run: node scripts/check_frontend.cjs
