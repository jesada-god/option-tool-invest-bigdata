name: Validate application

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-syntax:
    name: Backend syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python modules
        run: python -m compileall -q .
      - name: Import application and verify health check
        run: python -c "import main; assert main.health_check()['status'] == 'ok'"
      - name: Run deterministic unit tests
        shell: bash
        run: |
          # Preserve the test command's exit status while writing the final
          # traceback to the GitHub Job Summary.  This makes a failed deploy
          # diagnosable without changing a failing check into a false pass.
          set +e
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee "$RUNNER_TEMP/unittest.log"
          test_status=${PIPESTATUS[0]}
          {
            echo "### Deterministic unit tests"
            echo
            echo '```text'
            tail -n 240 "$RUNNER_TEMP/unittest.log"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$test_status"
      - name: Validate Render startup script
        run: sh -n scripts/start-render.sh

  frontend-syntax:
    name: Frontend syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate JavaScript syntax
        run: node --check tmp_fullscript.js
      - name: Verify inline script mirror
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const inline = html.match(/<script>\s*([\s\S]*?)\s*<\/script>/);
          if (!inline) throw new Error('Inline application script was not found.');
          const mirror = fs.readFileSync('tmp_fullscript.js', 'utf8').trim();
          if (inline[1].trim() !== mirror) {
            throw new Error('index.html inline script and tmp_fullscript.js are out of sync.');
          }
          NODE
